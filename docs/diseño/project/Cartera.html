  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1b26;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    ::-webkit-scrollbar { width: 0; }

    /* Dracula palette */
    :root {
      --bg:       #282a36;
      --card:     #44475a;
      --card2:    #383a4a;
      --text:     #f8f8f2;
      --muted:    #6272a4;
      --pink:     #ff79c6;
      --purple:   #bd93f9;
      --green:    #50fa7b;
      --cyan:     #8be9fd;
      --yellow:   #f1fa8c;
      --orange:   #ffb86c;
      --red:      #ff5555;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
      transition: opacity 0.25s, transform 0.25s;
    }
    .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }
    .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }

    .tab-bar {
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: #1e2030;
      border-top: 1px solid rgba(98,114,164,0.2);
      padding: 8px 0 20px;
      flex-shrink: 0;
      position: relative;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 4px 16px;
      border-radius: 12px;
      transition: all 0.2s;
    }
    .tab-item span {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.2s;
    }
    .tab-item.active span { color: var(--purple); }
    .fab {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(189,147,249,0.4);
      margin-top: -20px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .fab:active { transform: scale(0.94); box-shadow: 0 2px 10px rgba(189,147,249,0.3); }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
    }
    .card2 { background: var(--card2); border-radius: 16px; padding: 16px; }

    input, select, textarea {
      font-family: 'Inter', sans-serif;
      background: var(--card);
      border: 1.5px solid rgba(98,114,164,0.3);
      border-radius: 14px;
      color: var(--text);
      font-size: 15px;
      padding: 14px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--purple);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    select option { background: var(--card); color: var(--text); }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      width: 100%;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

    .btn-secondary {
      background: var(--card2);
      color: var(--text);
      border: 1.5px solid rgba(98,114,164,0.3);
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 14px;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-secondary:active { background: var(--card); }

    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      transition: opacity 0.25s;
    }
    .modal-overlay.hidden { opacity: 0; pointer-events: none; }
    .modal-sheet {
      width: 100%;
      background: #1e2030;
      border-radius: 24px 24px 0 0;
      padding: 12px 20px 36px;
      transform: translateY(0);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .modal-overlay.hidden .modal-sheet { transform: translateY(100%); }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--muted);
      border-radius: 2px;
      margin: 0 auto 20px;
      opacity: 0.4;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }

    .scroll-area {
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Bar chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 80px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar {
      width: 100%;
      border-radius: 6px 6px 2px 2px;
      transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    .bar-label {
      font-size: 9px;
      color: var(--muted);
      font-weight: 500;
    }

    /* Donut */
    .donut-ring { transform: rotate(-90deg); }

    /* Animated spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-glow { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes scan-line {
      0% { top: 10%; }
      100% { top: 90%; }
    }
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      animation: scan-line 2s ease-in-out infinite alternate;
      box-shadow: 0 0 12px var(--green);
    }
    @keyframes fadeInUp {
      from { opacity:0; transform: translateY(10px); }
      to { opacity:1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.4s ease forwards; }

    .json-line { animation: fadeInUp 0.3s ease forwards; opacity: 0; }

      box-shadow: 0 8px 32px rgba(0,0,0,0.5);

      margin-bottom: 12px;

    .tweak-toggle {

      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      border: none;
    }
    .tweak-toggle.on { background: var(--purple); }
    .tweak-toggle::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .tweak-toggle.on::after { transform: translateX(16px); }

// ── Donut chart component ───────────────────────────────────
function DonutChart({ data, size = 120 }) {
  const r = 44, cx = 60, cy = 60, circ = 2 * Math.PI * r;
  const total = data.reduce((a, b) => a + b.value, 0);
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox="0 0 120 120">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(98,114,164,0.15)" strokeWidth="14"/>
      {data.map((d, i) => {
        const pct = d.value / total;
        const dash = pct * circ;
        const seg = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={d.color} strokeWidth="14"
            strokeDasharray={`${dash} ${circ - dash}`}
            strokeDashoffset={-offset}
            className="donut-ring"
            strokeLinecap="round"
          />
        );
        offset += dash;
        return seg;
      })}
      <text x="60" y="55" textAnchor="middle" fill="#f8f8f2" fontSize="18" fontWeight="700" fontFamily="Inter">€284</text>
      <text x="60" y="72" textAnchor="middle" fill="#6272a4" fontSize="9" fontFamily="Inter">este mes</text>
    </svg>
  );
}

    const data = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([data], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `ticket-${ticket.comercio.replace(/\s/g,'-')}.svg`;

  const [phase, setPhase] = React.useState('scan'); // scan | loading | result
  const [jsonLines, setJsonLines] = React.useState([]);

  const startAnalysis = () => {
    setPhase('loading');
    setTimeout(() => {
      setPhase('result');
      let i = 0;
      const iv = setInterval(() => {
        setJsonLines(prev => [...prev, JSON_LINES[i]]);
        i++;
        if (i >= JSON_LINES.length) clearInterval(iv);
      }, 140);
    }, 2800);
  };

// Sparkline / bar chart component
function MiniChart({ points, color, type = 'bar', height = 90 }) {
  const max = Math.max(...points, 1);
  const w = 330, h = height;
  const n = points.length;
  const barW = Math.max(2, (w / n) - 3);

  if (type === 'line') {
    const pts = points.map((v, i) => {
      const x = (i / (n - 1)) * w;
      const y = h - (v / max) * (h - 8) - 4;
      return `${x},${y}`;
    }).join(' ');
    const area = `0,${h} ` + points.map((v, i) => {
      const x = (i / (n - 1)) * w;
      const y = h - (v / max) * (h - 8) - 4;
      return `${x},${y}`;
    }).join(' ') + ` ${w},${h}`;
    return (
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.01"/>
          </linearGradient>
        </defs>
        <polygon points={area} fill="url(#lineGrad)"/>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {/* last point dot */}
        {(() => {
          const lastNonZero = [...points].reverse().findIndex(v => v > 0);
          const idx = lastNonZero >= 0 ? points.length - 1 - lastNonZero : points.length - 1;
          const x = (idx / (n - 1)) * w;
          const y = h - (points[idx] / max) * (h - 8) - 4;
          return <circle cx={x} cy={y} r="4" fill={color} stroke="#282a36" strokeWidth="2"/>;
        })()}
      </svg>
    );
  }

  // bar chart
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.9"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.4"/>
        </linearGradient>
      </defs>
      {points.map((v, i) => {
        const x = i * (w / n) + 1;
        const bh = v > 0 ? Math.max(3, (v / max) * (h - 6)) : 2;
        const y = h - bh;
        const isMax = v === max;
        return (
          <g key={i}>
            <rect x={x} y={y} width={barW} height={bh}
              rx="3"
              fill={isMax ? `url(#barGrad)` : `${color}44`}
            />
            {isMax && <rect x={x} y={y} width={barW} height={bh} rx="3"
              fill="none" stroke={color} strokeWidth="1" opacity="0.5"/>}
          </g>
        );
      })}
    </svg>
  );
}

}

// ── Bottom Tab Bar ───────────────────────────────────────────
function TabBar({ active, onNav, onAdd }) {
  const tabs = [
    { id:'dashboard', icon:'home', label:'Inicio' },
    { id:'tickets', icon:'receipt', label:'Tickets' },
    { id:'_add', icon:'plus', label:'Añadir' },
    { id:'stats', icon:'chart', label:'Estadísticas' },
    { id:'profile', icon:'user', label:'Perfil' },
  ];
  return (
    <div className="tab-bar">
      {tabs.map(t => {
        if (t.id === '_add') return (
          <div key="add" style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
            <div className="fab" onClick={onAdd}>
              <Icon name="plus" size={26} color="#fff" strokeWidth={2.5}/>
            </div>
          </div>
        );
        const isActive = active === t.id;
        const iconColor = isActive ? '#bd93f9' : '#6272a4';
        return (
          <div key={t.id} className={`tab-item ${isActive?'active':''}`} onClick={() => onNav(t.id)}>
            <Icon name={t.icon} size={22} color={iconColor} strokeWidth={isActive?2.2:1.8}/>
            <span>{t.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState(() => {
    const s = localStorage.getItem('cartera_screen') || 'login';
    // detail needs selectedTicket — can't restore from localStorage, fall back to main
    return s === 'detail' ? 'main' : s;
  });
  const [tab, setTab] = React.useState('dashboard');
  const [modalOpen, setModalOpen] = React.useState(false);
  const [selectedTicket, setSelectedTicket] = React.useState(null);

  const openDetail = t => { setSelectedTicket(t); setScreen('detail'); };
  const [tweaks, setTweaks] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('cartera_tweaks') || 'null') || TWEAK_DEFAULTS; } catch { return TWEAK_DEFAULTS; }
  });

  React.useEffect(() => { localStorage.setItem('cartera_screen', screen); }, [screen]);

  // Tweaks panel messaging
  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel')?.classList.add('visible');
      } else if (e.data?.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel')?.classList.remove('visible');
      }
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    localStorage.setItem('cartera_tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const navToTab = t => { setTab(t); setScreen('main'); };

  const mainContent = () => {
    if (tab === 'dashboard') return <DashboardScreen onNav={navToTab} tweaks={tweaks} onDetail={openDetail} onProfile={() => navToTab('profile')}/>;
    if (tab === 'tickets') return <TicketsScreen onDetail={openDetail}/>;
    if (tab === 'profile') return <ProfileScreen onLogout={() => { setTab('dashboard'); setScreen('login'); }}/>;
    if (tab === 'stats') return <StatsScreen/>;
  };

  return (
    <div style={{ position:'relative', display:'inline-block' }}>
      <PhoneFrame>
        <div style={{ position:'relative', height:'100%', display:'flex', flexDirection:'column', background:'var(--bg)', overflow:'hidden' }}>

          {/* Login */}
          {screen === 'login' && <LoginScreen onLogin={() => setScreen('main')}/>}

          {/* Main shell */}
          {screen === 'main' && (
            <>
              <div style={{ flex:1, overflow:'hidden', position:'relative' }}>
                {mainContent()}
              </div>
              <TabBar active={tab} onNav={navToTab} onAdd={() => setModalOpen(true)}/>
            </>
          )}

          {/* Ticket detail */}
          {screen === 'detail' && selectedTicket && (
            <TicketDetail ticket={selectedTicket} onBack={() => setScreen('main')}/>
          )}

          {/* AI screen */}
          {screen === 'ai' && <AIScreen onBack={() => setScreen('main')} onDone={() => setScreen('success')}/>}

          {/* Manual form */}
          {screen === 'manual' && <ManualForm onBack={() => setScreen('main')} onDone={() => setScreen('success')}/>}

          {/* Success */}
          {screen === 'success' && <SuccessScreen onDone={() => { setTab('dashboard'); setScreen('main'); }}/>}

          {/* Add modal */}
          {screen === 'main' && (
            <AddModal
              visible={modalOpen}
              onClose={() => setModalOpen(false)}
              onAI={() => setScreen('ai')}
              onManual={() => setScreen('manual')}
            />
          )}
        </div>
      </PhoneFrame>

      {/* Tweaks panel */}
      <div id="tweaks-panel">
        <h4>Tweaks</h4>
        <div className="tweak-row">
          <label>Mostrar saldo</label>
          <button className={`tweak-toggle ${tweaks.showBalance?'on':''}`}
            onClick={() => updateTweak('showBalance', !tweaks.showBalance)}/>
        </div>
        <div className="tweak-row">
          <label>Modo compacto</label>
          <button className={`tweak-toggle ${tweaks.compactMode?'on':''}`}
            onClick={() => updateTweak('compactMode', !tweaks.compactMode)}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root" style="display:flex;align-items:center;justify-content:center;min-height:100vh;"></div>
</body>
</html>
